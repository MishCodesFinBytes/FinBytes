# Welcome to Jekyll!
#
# Site settings
email: me@finbytes.anonaddy.com
description: >-
  Just a documentary learning blog.
baseurl: "/FinBytes"
url: "https://mishcodesfinbytes.github.io"
github_username: MishCodesFinBytes

# Build settings
theme: minima

logo: /assets/images/logo.png

minima:
  logo: /assets/images/logo.png

plugins:
  - jekyll-feed
  - jekyll-sitemap

include:
  - _pages

# ── Navigation ──────────────────────────────────────────────────────────────
# header_pages is now only used for the simple flat links (About, Private).
# The multi-level dropdown nav is hardcoded in _includes/header.html.
# Quant Lab and Python index pages are included via their own collection/page
# entries and linked directly in header.html.
header_pages:
  - _pages/2024-10-30-about.html
  - private.html

# ── Collections ─────────────────────────────────────────────────────────────
collections:
  private:
    output: true
    permalink: /private/:name/
  quant_lab:
    output: true
    permalink: /quant-lab/:name/
  cpp:
    output: true
    permalink: /cpp/:name/
    # Posts in _cpp/series/A_testing/ etc. are picked up automatically.
    # Each post must have an explicit 'permalink' in its front matter
    # so the series subfolder path doesn't appear in the URL.
